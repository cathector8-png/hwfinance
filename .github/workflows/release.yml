name: Build and Host Debian Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y debhelper devscripts build-essential python3-all dh-python

      - name: Build Package
        run: dpkg-buildpackage -us -uc -b

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "../*.deb"

      - name: Deploy to APT Repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git checkout -b gh-pages || git checkout gh-pages
          mkdir -p repo
          cp ../*.deb repo/
          cd repo
          # Create the index file APT needs to find your package
          apt-ftparchive packages . > Packages
          gzip -k -f Packages
          cd ..
          git add repo/
          git commit -m "Update APT repository"
          git push origin gh-pages --force
