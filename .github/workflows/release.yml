name: Build Debian Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts build-essential python3-all dh-python

      - name: Build Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p hwfinance-${VERSION}
          cp -r debian hwfinance-${VERSION}/
          cp hwfinance hwfinance-${VERSION}/
          tar -czvf hwfinance_${VERSION}.orig.tar.gz hwfinance-${VERSION}
          cd hwfinance-${VERSION}
          dpkg-buildpackage -us -uc -b

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
