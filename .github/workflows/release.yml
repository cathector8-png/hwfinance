name: Build Debian Source Package

on:
  push:
    tags:
      - 'v*'

jobs:
  source-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version from Git Tag
        id: pre_req
        run: |
          # Strips the 'v' from the tag (e.g., v1.0.0 -> 1.0.0)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${TAG_VERSION}" >> $GITHUB_ENV

      - name: Install Debian Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper dh-python

      - name: Create Upstream Tarball Source
        run: |
          VERSION=1.0.14
          mkdir -p hwfinance-${VERSION}/debian
          cp -r debian/* hwfinance-${VERSION}/debian/
          cp hwfinance.py hwfinance-${VERSION}/hwfinance
          tar -czvf hwfinance_${VERSION}.orig.tar.gz hwfinance-${VERSION}
          
